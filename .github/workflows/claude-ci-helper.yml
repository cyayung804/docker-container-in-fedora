---
name: Claude CI Helper

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  
jobs:
  claude-ci-helper:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 10"
          prompt: |
            The GitHub Actions CI pipeline just failed on the "${{ github.event.workflow_run.name }}" workflow.
            Run ID: ${{ github.event.workflow_run.id }}

            1. Read the CI logs and explain the problem in simple terms.

            2. Suggest clear steps to fix the problem.

            3. If possible, fix the issue:
               - Create a new branch named `claude/fix-ci-${{ github.event.workflow_run.id }}`
               - Apply the fix
               - Open a pull request using `gh pr create`

               The pull request should include:
               - A clear title describing the fix
               - A short description with:
                 - A summary of the problem
                 - What was changed to fix it

            Use this command to read the failed logs:
            `gh run view ${{ github.event.workflow_run.id }} --log-failed`
