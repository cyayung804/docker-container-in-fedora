---
name: Docker build alpine

on:
  push:
    branches:
      - main
    paths:
      - 'src/alpine/.alpine-version'
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:master
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::814808959864:role/AWSOpenIDConnectGitHubAction
          aws-region: ap-southeast-1

      - name: Docker build all tags
        if: github.event_name == 'workflow_dispatch'
        run: |
          make install
          make build-all image=alpine

      - name: Docker build latest
        if: github.event_name == 'push'
        run: |
          make install
          make build image=alpine

      - name: Upload build logs to S3
        if: always()
        run: |
          aws s3 cp /tmp/build-logs/alpine/ \
            s3://github-cyayung804-alpine-docker-images/alpine/${{ github.run_id }}/${{ github.run_attempt }}/ \
            --recursive
